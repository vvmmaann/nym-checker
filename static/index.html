function doBatchCheck(){
  var filtered=nodes.slice();
  if(filterMode)filtered=filtered.filter(function(n){return n.mode===filterMode;});
  if(query)filtered=filtered.filter(function(n){return searchMatch(n,query);});
  if(!filtered.length||filtered.length>BATCH_MAX)return;
  var ids=[];
  for(var i=0;i<filtered.length;i++){if(filtered[i].node_id!==undefined&&filtered[i].node_id!=='')ids.push(filtered[i].node_id);}
  if(!ids.length)return;
  window._batchN=ids.length;
  batchChecking=true;batchResults=null;selected=null;renderContent();
  fetch('/api/check-batch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ids:ids})}).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}).then(function(d){
    batchChecking=false;
    if(d&&d.results){
      d.results.sort(function(a,b){return (b.score?b.score.total:0)-(a.score?a.score.total:0);});
      batchResults=d.results;

}

function countryName(cc,fallback){
  if(!cc)return fallback||'';

  try{
    var dn=new Intl.DisplayNames([lang],{type:'region'});
    var n=dn.of(cc.toUpperCase());

function translateReason(r,t){

  return tpl.replace(/\{(\w+)\}/g,function(_,k){return params[k]!==undefined?params[k]:'';});

  var tgtLabel=r.classification==='not_recommended'?(t.deployIdealTarget||'Ideal (if safe)'):(t.deployTarget||'Target');
  var tgtVal=r.classification==='not_recommended'?(r.ideal_target||0):(r.target_nodes||0);
  h+='<div style="background:'+c.bg2+';border:1px solid '+c.brd+';border-radius:8px;padding:10px 12px"><div style="font-size:10px;color:'+c.tx4+';text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">'+tgtLabel+'</div><div style="font-size:18px;font-weight:700;color:#38BDF8;font-family:JetBrains Mono,monospace">'+tgtVal+'</div></div>';
  h+='<div style="background:'+c.bg2+';border:1px solid '+c.brd+';border-radius:8px;padding:10px 12px"><div style="font-size:10px;color:'+c.tx4+';text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">'+(t.deployNeeded||'Recommended')+'</div><div style="font-size:18px;font-weight:700;color:'+(r.needed_nodes>0?'#00E599':c.tx2)+';font-family:JetBrains Mono,monospace">+'+(r.needed_nodes||0)+'</div></div>';
  h+='<div style="background:'+c.bg2+';border:1px solid '+c.brd+';border-radius:8px;padding:10px 12px"><div style="font-size:10px;color:'+c.tx4+';text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">'+(t.deployShare||'Network share')+'</div><div style="font-size:18px;font-weight:700;color:'+c.tx+';font-family:JetBrains Mono,monospace">'+r.network_share+'%</div></div>';
  h+='</div>';
  // Reasoning
  if(r.reasoning&&r.reasoning.length){
    h+='<div style="background:'+c.bg2+';border:1px solid '+c.brd+';border-radius:10px;padding:14px;margin-bottom:16px">';
    h+='<div style="font-size:12px;font-weight:600;color:'+c.tx2+';margin-bottom:8px">'+(t.deployFactors||'Key factors')+'</div>';
    h+='<ul style="margin:0;padding-left:18px;font-size:12px;color:'+c.tx3+';line-height:1.7">';
    r.reasoning.forEach(function(reason){h+='<li>'+esc(translateReason(reason,t))+'</li>';});
    h+='</ul></div>';
  }
  // Node list
  if(r.nodes&&r.nodes.length){
    h+='<div style="margin-bottom:16px"><div style="font-size:13px;font-weight:600;color:'+c.tx2+';margin-bottom:8px">'+(t.deployExistingNodes||'Existing nodes')+' ('+r.nodes.length+')</div>';
    h+='<div style="display:flex;flex-direction:column;gap:6px">';
    r.nodes.forEach(function(n){
      h+='<div onclick="setView(\''+esc(n.ip)+'\')" style="background:'+c.bg2+';border:1px solid '+c.brd+';border-radius:8px;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px;cursor:pointer" onmouseover="this.style.borderColor=\'#38BDF8\'" onmouseout="this.style.borderColor=\''+c.brd+'\'">';
      h+='<div style="min-width:0;flex:1"><div style="font-size:12px;font-weight:600;color:'+c.tx+';overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(n.moniker||n.ip)+'</div>';
      h+='<div style="font-size:10px;color:'+c.tx3+';font-family:JetBrains Mono,monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(n.ip)+(n.hostname?' \u00B7 '+esc(n.hostname):'')+'</div></div>';
      h+='<div style="display:flex;gap:4px;flex-shrink:0">';
      if(n.mode)h+=badge(n.mode,MC[n.mode]||c.tx3);
      if(n.version)h+=badge('v'+esc(n.version),'#00E599');
      if(n.wg)h+=badge('WG','#A78BFA');
      h+='</div></div>';
    });
    h+='</div></div>';
  }else{
    h+='<div style="background:'+c.bg2+';border:1px solid '+c.brd+';border-radius:10px;padding:14px;color:'+c.tx3+';font-size:12px;text-align:center">'+(t.deployNoNodesYet||'No Nym nodes in this country yet')+'</div>';
  }
  h+='</div>';
  return h;
}
function setView(ip){deploySelected=null;deployDetail=null;query=ip;page='nodes';renderHeader();renderContent();}
function renderNetworkPage(t,c){
  var el=document.getElementById('content');
  if(netLoading||!netStats){el.innerHTML='<div style="max-width:700px;margin:0 auto;padding:20px;text-align:center;color:'+c.tx3+';font-family:JetBrains Mono,monospace;font-size:12px">'+(t.loading||'Loading...')+'</div>';return;}
  var s=netStats,total=s.total||0;
  var h='<div style="position:relative;z-index:1;max-width:700px;margin:0 auto;padding:0 20px 40px">';
  // Top metrics
  var compliant=s.fully_compliant||0;
  var pct=total>0?Math.round(compliant/total*100):0;
  h+='<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px">';
  h+=statBox(total,t.totalNodes||'Total Nodes',c,'#00E599');
  h+=statBox(pct+'%',(t.compliance||'Fully compliant'),c,pct>=70?'#00E599':pct>=40?'#FFB224':'#FF4D6A');
  h+=statBox(s.toc?(s.toc.accepted||0):0,t.tocAccepted||'T&C Accepted',c,'#38BDF8');
  h+=statBox(s.ipv6?(s.ipv6.enabled||0):0,t.ipv6Enabled||'IPv6 Enabled',c,'#A78BFA');
  h+='</div>';
  // Top issues
  if(s.top_issues&&s.top_issues.length){
    h+='<div style="background:'+c.bg2+';border:1px solid '+c.brd+';border-radius:10px;overflow:hidden;margin-bottom:12px">';
    h+='<div style="padding:10px 16px;border-bottom:1px solid '+c.brd+';font-size:10px;color:'+c.tx4+';text-transform:uppercase;letter-spacing:.08em;font-weight:600">'+(t.issues||'Top Issues')+'</div>';
    for(var i=0;i<s.top_issues.length;i++){
      var issue=s.top_issues[i],pctI=total>0?Math.round(issue.count/total*100):0;
      h+='<div style="padding:10px 16px;border-bottom:1px solid '+c.brd+';display:flex;align-items:center;gap:12px">';
      h+='<div style="flex:1"><div style="font-size:12px;color:'+c.tx+';margin-bottom:4px">'+(issue.key&&t[issue.key]?t[issue.key]:issue.label)+'</div>';
      h+='<div style="height:4px;background:'+c.bg3+';border-radius:2px"><div style="height:4px;background:#FF4D6A;border-radius:2px;width:'+pctI+'%"></div></div></div>';
      h+='<div style="font-family:JetBrains Mono,monospace;font-size:12px;color:#FF4D6A;min-width:60px;text-align:right">'+issue.count+' <span style="font-size:10px;color:'+c.tx3+'">'+pctI+'%</span></div>';
      h+='</div>';
    }
    h+='</div>';
  }
  // Version breakdown
  if(s.version){
    h+='<div style="background:'+c.bg2+';border:1px solid '+c.brd+';border-radius:10px;overflow:hidden;margin-bottom:12px">';
    h+='<div style="padding:10px 16px;border-bottom:1px solid '+c.brd+';font-size:10px;color:'+c.tx4+';text-transform:uppercase;letter-spacing:.08em;font-weight:600">'+(t.verDist||'Version Distribution')+'</div>';
    var vrows=[[t.verOk||'Up to date',s.version.current,'#00E599'],[t.ver1||'1 behind',s.version.behind_1,'#FFB224'],[t.ver2||'2 behind',s.version.behind_2,'#FF8C42'],[t.ver3||'3 behind',s.version.behind_3,'#FF4D6A'],[t.ver4||'4+ behind',s.version.behind_4plus,'#9CA3AF']];
    for(var vi=0;vi<vrows.length;vi++){
      var vr=vrows[vi],vpct=total>0?Math.round(vr[1]/total*100):0;
      h+='<div style="padding:8px 16px;border-bottom:1px solid '+c.brd+';display:flex;align-items:center;gap:10px">';
      h+='<div style="width:80px;font-size:11px;color:'+c.tx2+'">'+vr[0]+'</div>';
      h+='<div style="flex:1;height:4px;background:'+c.bg3+';border-radius:2px"><div style="height:4px;background:'+vr[2]+';border-radius:2px;width:'+vpct+'%"></div></div>';
      h+='<div style="font-family:JetBrains Mono,monospace;font-size:11px;color:'+vr[2]+';width:60px;text-align:right">'+vr[1]+'</div>';
      h+='</div>';
    }
    h+='</div>';
  }
  // Version status (prerelease/ahead detection)
  if(s.version&&s.version.by_status){
    var vs=s.version.by_status;
    var preCnt=(vs.prerelease||0)+(vs.ahead||0);
    if(preCnt>0){
      h+='<div style="background:'+c.bg2+';border:1px solid '+c.brd+';border-radius:10px;padding:10px 16px;margin-bottom:12px;display:flex;align-items:center;gap:10px">';
      h+='<div style="font-size:11px;color:'+c.tx2+';flex:1">'+(t.versionPreReleaseAhead||'Pre-release / ahead-of-stable')+'</div>';
      h+='<div style="font-family:JetBrains Mono,monospace;font-size:12px;color:#A78BFA">'+preCnt+'</div>';
      h+='</div>';
    }
  }
  // SMTP aggregate (exits only)
  if(s.smtp&&s.smtp.total_exits>0){
    h+='<div style="background:'+c.bg2+';border:1px solid '+c.brd+';border-radius:10px;overflow:hidden;margin-bottom:12px">';
    h+='<div style="padding:10px 16px;border-bottom:1px solid '+c.brd+';font-size:10px;color:'+c.tx4+';text-transform:uppercase;letter-spacing:.08em;font-weight:600">'+(t.smtpAggregate||'SMTP egress (exit gateways)')+'</div>';
    var srows=[[t.smtpOpen||'Open',s.smtp.open||0,'#00E599'],[t.smtpPartial||'Partial',s.smtp.partial||0,'#FFB224'],[t.smtpBlocked||'Blocked',s.smtp.blocked||0,'#FF4D6A'],[(t.deployStatusNoData||'Unknown'),s.smtp.unknown||0,'#6B7280']];
    var tot=s.smtp.total_exits;
    for(var si=0;si<srows.length;si++){
      var sr=srows[si],spct=tot>0?Math.round(sr[1]/tot*100):0;
      h+='<div style="padding:8px 16px;border-bottom:1px solid '+c.brd+';display:flex;align-items:center;gap:10px">';
      h+='<div style="width:80px;font-size:11px;color:'+c.tx2+'">'+sr[0]+'</div>';
      h+='<div style="flex:1;height:4px;background:'+c.bg3+';border-radius:2px"><div style="height:4px;background:'+sr[2]+';border-radius:2px;width:'+spct+'%"></div></div>';
      h+='<div style="font-family:JetBrains Mono,monospace;font-size:11px;color:'+sr[2]+';width:80px;text-align:right">'+sr[1]+' ('+spct+'%)</div>';
      h+='</div>';
    }
    h+='</div>';
  }
  // Mode distribution
  if(s.by_mode){
    h+='<div style="background:'+c.bg2+';border:1px solid '+c.brd+';border-radius:10px;overflow:hidden;margin-bottom:12px">';
    h+='<div style="padding:10px 16px;border-bottom:1px solid '+c.brd+';font-size:10px;color:'+c.tx4+';text-transform:uppercase;letter-spacing:.08em;font-weight:600">'+(t.distribution||'Node Distribution')+'</div>';
    var mrows=[[t.mix||'Mixnode',s.by_mode.mixnode||0,'#A78BFA'],[t.entryGw||'Entry Gateway',s.by_mode['entry-gateway']||0,'#38BDF8'],[t.exitGw||'Exit Gateway',s.by_mode['exit-gateway']||0,'#F472B6']];
    for(var mi=0;mi<mrows.length;mi++){
      var mr=mrows[mi],mpct=total>0?Math.round(mr[1]/total*100):0;
      h+='<div style="padding:8px 16px;border-bottom:1px solid '+c.brd+';display:flex;align-items:center;gap:10px">';
      h+='<div style="width:100px;font-size:11px;color:'+c.tx2+'">'+mr[0]+'</div>';
      h+='<div style="flex:1;height:4px;background:'+c.bg3+';border-radius:2px"><div style="height:4px;background:'+mr[2]+';border-radius:2px;width:'+mpct+'%"></div></div>';
      h+='<div style="font-family:JetBrains Mono,monospace;font-size:11px;color:'+mr[2]+';width:80px;text-align:right">'+mr[1]+' ('+mpct+'%)</div>';
      h+='</div>';
    }
    h+='</div>';
  }
  
  h+='</div>';
  el.innerHTML=h;
}
function statBox(val,label,c,color){
  return '<div style="background:'+c.bg2+';border:1px solid '+c.brd+';border-radius:10px;padding:16px;text-align:center"><div style="font-family:JetBrains Mono,monospace;font-size:24px;font-weight:700;color:'+color+'">'+val+'</div><div style="font-size:11px;color:'+c.tx3+';margin-top:4px">'+label+'</div></div>';
}
renderHeader();loadNodes();loadRef();try{fetch('/api/hit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path:location.pathname+location.search,lang:lang})}).catch(function(){});}catch(e){}
var pp=new URLSearchParams(window.location.search);
var np=pp.get('node');
var pgParam=pp.get('page');
var ccParam=pp.get('country');
if(np){doCheck(np);}
else if(pgParam==='network'){setPage('network');}
else if(pgParam==='insights'){
  page='insights';
  var tabParam=pp.get('tab');
  var asnParam=pp.get('asn');
  if(tabParam==='providers'){
    insightsTab='providers';
    if(asnParam){loadProvidersData();loadProviderDetail(asnParam);}
    else{loadProvidersData();}
  } else if(ccParam){
    loadDeployData();loadDeployDetail(ccParam);
  } else {
    loadDeployData();
  }
  renderHeader();renderContent();
}
</script>
