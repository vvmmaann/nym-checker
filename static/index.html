  if(filterMode)filtered=filtered.filter(function(n){return n.mode===filterMode;});
  if(query)filtered=filtered.filter(function(n){return searchMatch(n,query);});
  if(!filtered.length||filtered.length>BATCH_MAX)return;
  var ids=[];
  for(var i=0;i<filtered.length;i++){if(filtered[i].node_id!==undefined&&filtered[i].node_id!=='')ids.push(filtered[i].node_id);}
  if(!ids.length)return;
  window._batchN=ids.length;
  batchChecking=true;batchResults=null;selected=null;renderContent();
  fetch('/api/check-batch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ids:ids})}).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}).then(function(d){
    batchChecking=false;
    if(d&&d.results){
      d.results.sort(function(a,b){return (b.score?b.score.total:0)-(a.score?a.score.total:0);});
      batchResults=d.results;
    }else{
      alert('Batch check failed: '+(d&&d.error?d.error:'unknown error'));
    }
    renderContent();
  }).catch(function(e){batchChecking=false;alert('Error: '+e);renderContent();});
}
function doBatchCheckSelected(){
  var ids=[];
  for(var k in batchSelected){if(batchSelected[k]){var x=parseInt(k,10);if(!isNaN(x))ids.push(x);}}
  if(!ids.length||ids.length>BATCH_MAX)return;
  window._batchN=ids.length;
  batchChecking=true;batchResults=null;selected=null;renderContent();
  fetch('/api/check-batch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ids:ids})}).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}).then(function(d){
    batchChecking=false;
    if(d&&d.results){
      d.results.sort(function(a,b){return (b.score?b.score.total:0)-(a.score?a.score.total:0);});
      batchResults=d.results;
    }else{
      alert('Batch check failed: '+(d&&d.error?d.error:'unknown error'));
    }
    renderContent();
  }).catch(function(e){batchChecking=false;alert('Error: '+e);renderContent();});
}
function goBackFromBatch(){batchResults=null;batchChecking=false;popupResult=null;renderPopup();renderContent();}
function openPopup(idx){if(!batchResults||!batchResults[idx])return;popupResult=batchResults[idx];renderPopup();}
function closePopup(){popupResult=null;renderPopup();}
function renderPopup(){
  var el=document.getElementById('popup');if(!el)return;
  if(!popupResult){el.innerHTML='';return;}
  var t=T[lang]||T.en,c=C();
  var _mob=isMobile();
  var _ovPad=_mob?'padding:10px':'padding:40px 20px';
  var _modPad=_mob?'padding:40px 14px 16px':'padding:24px 24px 20px';
  var h='<div onclick="closePopup()" style="position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:flex-start;justify-content:center;'+_ovPad+';overflow-y:auto;animation:fadeIn .2s forwards">';
  h+='<div onclick="event.stopPropagation()" style="background:'+c.bg2+';border:1px solid '+c.brd+';border-radius:16px;'+_modPad+';max-width:680px;width:100%;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:fadeIn .25s forwards">';
  h+='<button onclick="closePopup()" style="position:absolute;top:12px;right:12px;background:'+c.bg3+';border:1px solid '+c.brd+';border-radius:8px;width:32px;height:32px;color:'+c.tx+';font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;font-family:Outfit,sans-serif">\u2715</button>';
  h+=renderDetailCard(popupResult,t,c,'popup',false);
  h+='</div></div>';
  el.innerHTML=h;
}
document.addEventListener('keydown',function(e){if(e.key==='Escape'&&popupResult)closePopup();});

var _resizeT=null;
window.addEventListener('resize',function(){
  if(_resizeT)clearTimeout(_resizeT);
  _resizeT=setTimeout(function(){renderContent();if(popupResult)renderPopup();},150);
});
function loadNodes(){fetch('/api/nodes').then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}).then(function(d){nodes=d.nodes||[];for(var i=0;i<nodes.length;i++){nodes[i].moniker=nodes[i].moniker||('Node '+nodes[i].node_id);}nodesLoaded=true;renderContent();}).catch(function(e){console.error(e);nodesLoaded=true;renderContent();});}
function loadRef(){fetch('/api/reference').then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}).then(function(d){latestVer=d.latest_version||'';window._releases=d.releases||[];renderContent();}).catch(function(){});}
function doCheck(ip){checking=true;selected=null;renderContent();history.replaceState(null,'','/?node='+encodeURIComponent(ip));fetch('/api/check?target='+encodeURIComponent(ip)).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}).then(function(d){selected=d;checking=false;renderContent();}).catch(function(e){selected={error:String(e),node_ip:ip,score:{total:0}};checking=false;renderContent();});}

function goBack(){selected=null;history.replaceState(null,'','/');renderContent();}
function setLang(l){lang=l;localStorage.setItem('nymLang',l);renderHeader();renderContent();}

var _nymP=null;
function fetchNymPrice(){
  fetch('/api/price')
  .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json()})
  .then(function(d){
    if(d&&d.usd){_nymP=d;updateNymPrice();}
  }).catch(function(){});
}
function updateNymPrice(){
  var el=document.getElementById('nym-price');
  if(!el||!_nymP)return;
  var c=C(),price=_nymP.usd,change=_nymP.usd_24h_change;
  var dir=change>=0?'up':'down';
  var arrow=change>=0?'\u25B2':'\u25BC';
  var cc=change>=0?'#00E599':'#FF4D6A';
  el.style.background=c.bg3;el.style.borderColor=c.brd;el.style.color=c.tx2;
  el.innerHTML='NYM <span class="nym-price-val" style="color:'+c.tx+'">$'+price.toFixed(4)+'</span>'+
    '<span class="nym-price-change" style="color:'+cc+'">'+arrow+' '+Math.abs(change).toFixed(2)+'%</span>';
}
fetchNymPrice();setInterval(fetchNymPrice,300000);

function toggleEP(key){key=key||'';var el=document.getElementById('epList'+key);var btn=document.getElementById('epToggle'+key);if(!el||!btn)return;var t=T[lang]||T.en;if(el.style.display==='none'||!el.style.display){el.style.display='flex';btn.textContent=t.exitPolicyHide||'Hide ports';}else{el.style.display='none';btn.textContent=t.exitPolicyShow||'Show all ports';}}
function toggleDark(){dark=!dark;localStorage.setItem('nymDark',String(dark));renderHeader();renderContent();}
function setFM(m){filterMode=filterMode===m?null:m;selected=null;renderContent();}
function setPage(p){page=p;if(p==='network'&&!netStats&&!netLoading)loadNetStats();renderHeader();renderContent();}
function loadNetStats(){
  netLoading=true;renderContent();
  fetch('/api/network-stats').then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}).then(function(d){netStats=d;netLoading=false;renderContent();}).catch(function(){netLoading=false;renderContent();});
}
function renderNetworkPage(t,c){
  var el=document.getElementById('content');
  if(netLoading||!netStats){el.innerHTML='<div style="max-width:700px;margin:0 auto;padding:20px;text-align:center;color:'+c.tx3+';font-family:JetBrains Mono,monospace;font-size:12px">Loading...</div>';return;}
  var s=netStats,total=s.total||0;
  var h='<div style="position:relative;z-index:1;max-width:700px;margin:0 auto;padding:0 20px 40px">';
  // Top metrics
  var compliant=s.fully_compliant||0;
  var pct=total>0?Math.round(compliant/total*100):0;
  h+='<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px">';
  h+=statBox(total,t.totalNodes||'Total Nodes',c,'#00E599');
  h+=statBox(pct+'%',(t.compliance||'Fully compliant'),c,pct>=70?'#00E599':pct>=40?'#FFB224':'#FF4D6A');
  h+=statBox(s.toc?(s.toc.accepted||0):0,t.tocAccepted||'T&C Accepted',c,'#38BDF8');
  h+=statBox(s.ipv6?(s.ipv6.enabled||0):0,t.ipv6Enabled||'IPv6 Enabled',c,'#A78BFA');
  h+='</div>';
  // Top issues
  if(s.top_issues&&s.top_issues.length){
    h+='<div style="background:'+c.bg2+';border:1px solid '+c.brd+';border-radius:10px;overflow:hidden;margin-bottom:12px">';
    h+='<div style="padding:10px 16px;border-bottom:1px solid '+c.brd+';font-size:10px;color:'+c.tx4+';text-transform:uppercase;letter-spacing:.08em;font-weight:600">'+(t.issues||'Top Issues')+'</div>';
    for(var i=0;i<s.top_issues.length;i++){
      var issue=s.top_issues[i],pctI=total>0?Math.round(issue.count/total*100):0;
      h+='<div style="padding:10px 16px;border-bottom:1px solid '+c.brd+';display:flex;align-items:center;gap:12px">';
      h+='<div style="flex:1"><div style="font-size:12px;color:'+c.tx+';margin-bottom:4px">'+(issue.key&&t[issue.key]?t[issue.key]:issue.label)+'</div>';
      h+='<div style="height:4px;background:'+c.bg3+';border-radius:2px"><div style="height:4px;background:#FF4D6A;border-radius:2px;width:'+pctI+'%"></div></div></div>';
      h+='<div style="font-family:JetBrains Mono,monospace;font-size:12px;color:#FF4D6A;min-width:60px;text-align:right">'+issue.count+' <span style="font-size:10px;color:'+c.tx3+'">'+pctI+'%</span></div>';
      h+='</div>';
    }
    h+='</div>';
  }
  // Version breakdown
  if(s.version){
    h+='<div style="background:'+c.bg2+';border:1px solid '+c.brd+';border-radius:10px;overflow:hidden;margin-bottom:12px">';
    h+='<div style="padding:10px 16px;border-bottom:1px solid '+c.brd+';font-size:10px;color:'+c.tx4+';text-transform:uppercase;letter-spacing:.08em;font-weight:600">'+(t.verDist||'Version Distribution')+'</div>';
    var vrows=[[t.verOk||'Up to date',s.version.current,'#00E599'],[t.ver1||'1 behind',s.version.behind_1,'#FFB224'],[t.ver2||'2 behind',s.version.behind_2,'#FF8C42'],[t.ver3||'3 behind',s.version.behind_3,'#FF4D6A'],[t.ver4||'4+ behind',s.version.behind_4plus,'#9CA3AF']];
    for(var vi=0;vi<vrows.length;vi++){
      var vr=vrows[vi],vpct=total>0?Math.round(vr[1]/total*100):0;
      h+='<div style="padding:8px 16px;border-bottom:1px solid '+c.brd+';display:flex;align-items:center;gap:10px">';
      h+='<div style="width:80px;font-size:11px;color:'+c.tx2+'">'+vr[0]+'</div>';
      h+='<div style="flex:1;height:4px;background:'+c.bg3+';border-radius:2px"><div style="height:4px;background:'+vr[2]+';border-radius:2px;width:'+vpct+'%"></div></div>';
      h+='<div style="font-family:JetBrains Mono,monospace;font-size:11px;color:'+vr[2]+';width:60px;text-align:right">'+vr[1]+'</div>';
      h+='</div>';
    }
    h+='</div>';
  }
  // Mode distribution
  if(s.by_mode){
    h+='<div style="background:'+c.bg2+';border:1px solid '+c.brd+';border-radius:10px;overflow:hidden;margin-bottom:12px">';
    h+='<div style="padding:10px 16px;border-bottom:1px solid '+c.brd+';font-size:10px;color:'+c.tx4+';text-transform:uppercase;letter-spacing:.08em;font-weight:600">'+(t.distribution||'Node Distribution')+'</div>';
    var mrows=[[t.mix||'Mixnode',s.by_mode.mixnode||0,'#A78BFA'],[t.entryGw||'Entry Gateway',s.by_mode['entry-gateway']||0,'#38BDF8'],[t.exitGw||'Exit Gateway',s.by_mode['exit-gateway']||0,'#F472B6']];
    for(var mi=0;mi<mrows.length;mi++){
      var mr=mrows[mi],mpct=total>0?Math.round(mr[1]/total*100):0;
      h+='<div style="padding:8px 16px;border-bottom:1px solid '+c.brd+';display:flex;align-items:center;gap:10px">';
      h+='<div style="width:100px;font-size:11px;color:'+c.tx2+'">'+mr[0]+'</div>';
      h+='<div style="flex:1;height:4px;background:'+c.bg3+';border-radius:2px"><div style="height:4px;background:'+mr[2]+';border-radius:2px;width:'+mpct+'%"></div></div>';
      h+='<div style="font-family:JetBrains Mono,monospace;font-size:11px;color:'+mr[2]+';width:80px;text-align:right">'+mr[1]+' ('+mpct+'%)</div>';
      h+='</div>';
    }
    h+='</div>';
  }
  
  h+='</div>';
  el.innerHTML=h;
}
function statBox(val,label,c,color){
  return '<div style="background:'+c.bg2+';border:1px solid '+c.brd+';border-radius:10px;padding:16px;text-align:center"><div style="font-family:JetBrains Mono,monospace;font-size:24px;font-weight:700;color:'+color+'">'+val+'</div><div style="font-size:11px;color:'+c.tx3+';margin-top:4px">'+label+'</div></div>';
}
